<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div>
        <h1>Bài 1:</h1>
        <label>
            Nhiệt độ độ C:
            <input type="number" id="doC">
        </label>
        <p id="hiddenText"></p>
        <button onclick="bai1()">Đổi sang độ F</button>
    </div>
    <div>
        <h1>Bài 2:</h1>
        <label>
            Độ dài (m):
            <input type="number" id="m">
        </label>
        <p id="hiddenText1"></p>
        <button onclick="bai2()">Chuyển sang feet</button>
    </div>

    <div>
        <h1>Bài 3:</h1>
        <label>
            Độ dài cạnh hình vuông:
            <input type="number" id="side">
        </label>
        <p id="hiddenTex2"></p>
        <button onclick="bai3()">Tính diện tích</button>
    </div>

    <div>
        <h1>Bài 4:</h1>
        <label>
            Độ dài cạnh dài hình chữ nhật:
            <input type="number" id="longSide">
        </label>
        <label>
            Độ dài cạnh ngắn hình chữ nhật:
            <input type="number" id="shortSide">
        </label>
        <p id="hiddenTex3"></p>
        <button onclick="bai4()">Tính diện tích</button>
    </div>

    <div>
        <h1>Bài 5:</h1>
        <label>
            Độ dài cạnh góc vuông A của tam giác vuông:
            <input type="number" id="sideA">
        </label>
        <label>
            Độ dài cạnh góc vuông B của tam giác vuông:
            <input type="number" id="sideB">
        </label>
        <p id="hiddenTex4"></p>
        <button onclick="bai5()">Tính diện tích</button>
    </div>

    <div>
        <h1>Bài 6: Phương trình bậc 1 (ax+b=0)</h1>
        <label>
            Số thứ nhất (a):
            <input type="number" id="numberA">
        </label>
        <label>
            Số thứ hai (b):
            <input type="number" id="numberB">
        </label>
        <p id="hiddenTex5"></p>
        <button onclick="bai6()">giải phép tính</button>
    </div>

    <div>
        <h1>Bài 7: Phương trình bậc 2 (ax^2+bx+c=0)</h1>
        <label>
            Số thứ nhất (a):
            <input type="number" id="numberAex7">
        </label>
        <label>
            Số thứ hai (b):
            <input type="number" id="numberBex7">
        </label>
        <label>
            Số thứ hai (c):
            <input type="number" id="numberCex7">
        </label>
        <p id="hiddenTex6"></p>
        <button onclick="bai7()">giải phép tính</button>
    </div>

    <div>
        <h1>Bài 8:</h1>
        <label>
            Nhập vào số tuổi:
            <input type="number" id="age">
        </label>
        <p id="hiddenText7"></p>
        <button onclick="bai8()">Kiểm tra</button>
    </div>

    <div>
        <h1>Bài 9: Nhập vào 3 cạnh của một tam giác</h1>
        <label>
            Cạnh A:
            <input type="number" id="sideAofTriangle">
        </label>
        <label>
            Cạnh B:
            <input type="number" id="sideBofTriangle">
        </label>
        <label>
            Cạnh C:
            <input type="number" id="sideCofTriangle">
        </label>
        <p id="hiddenTex8"></p>
        <button onclick="bai9()">giải phép tính</button>
    </div>

    <div>
        <h1>Bài 10:</h1>
        <label>
            Nhập vào số kWh sử dụng:
            <input type="number" id="kWh">
        </label>
        <p id="hiddenText9"></p>
        <button onclick="bai10()">Kiểm tra</button>
    </div>

    <div>
        <h1>Bài 11:</h1>
        <label>
            Nhập vào thu nhập của bạn:
            <input type="number" id="salary">
        </label>
        <p id="hiddenText10"></p>
        <button onclick="bai11()">Kiểm tra</button>
    </div>

    <div>
        <h1>Bài 12: Tính lãi xuất ngân hàng</h1>
        <label>
            Số tiền ban đầu (P):
            <input type="number" id="Principal">
        </label>
        <label>
            Số tháng cho vay(n):
            <input type="number" id="NumberOfPeriod">
        </label>
        <label>
            Lãi xuất hàng tháng (r):
            <input type="number" id="Rate">
        </label>
        <p id="hiddenTex11"></p>
        <button onclick="bai12()">giải phép tính</button>
    </div>


    <script src="../jsFile/Examples2.js"></script>
</body>
</html>
