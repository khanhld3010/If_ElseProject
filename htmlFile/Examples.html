<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div>
        <h1>Bài 1</h1>
        <label>
            Số thứ nhất:
            <input type="number" min="1" max="10" step="1" value="1" id="Number1"/>
            <br>
            Số thứ hai:
            <input type="number" min="1" max="10" step="1" value="1" id="Number2"/>
        </label>
        <p id="hiddenText1"></p>
        <button onclick="example1()">Kiểm tra</button>
    </div>

    <div>
        <h1>Bài 2</h1>
        <label>
            Số tuổi:
            <input type="number" min="1" max="10" step="1" value="1" id="age"/>
        </label>
        <p id="hiddenText2"></p>
        <button onclick="example2()">Kiểm tra</button>
    </div>

    <div>
        <h1>Bài 3</h1>
        <button onclick="example3()">Bấm để random số</button>
        <p id="hiddenText3"></p>
    </div>

    <div>
        <h1>Bài 4</h1>
        <label>
            Số thứ nhất:
            <input type="number" min="1" max="10" step="1" value="1" id="number1ex4"/>
        </label>
        <label>
            Số thứ hai:
            <input type="number" min="1" max="10" step="1" value="1" id="number2ex4"/>
        </label>
        <label>
            Số ba:
            <input type="number" min="1" max="10" step="1" value="1" id="number3ex4"/>
        </label>

        <button onclick="example4()">Số nào là số lơn nhất?</button>
        <p id="hiddenText4"></p>
    </div>

    <div>
        <h1>Bài 5</h1>
        <label>
            điểm kiểm tra:
            <input type="number" min="1" max="10" step="1" value="1" id="number1ex5"/>
        </label>
        <label>
            điểm giữa kỳ:
            <input type="number" min="1" max="10" step="1" value="1" id="number2ex5"/>
        </label>
        <label>
            điểm cuối kỳ
            <input type="number" min="1" max="10" step="1" value="1" id="number3ex5"/>
        </label>

        <button onclick="example5()">Học lực của bạn là: </button>
        <p id="hiddenText5"></p>
    </div>

    <div>
        <h1>Bài 6</h1>
        <label>
            Doanh số bán hàng của bạn:
            <input type="number" min="1" max="10" step="1" value="1" id="number1ex6"/>
        </label>
        <p id="hiddenText6"></p>
        <button onclick="example6()">Kiểm tra</button>
    </div>

    <div>
        <h1>Bài 7</h1>
        <label>
            Số phút bạn đã dùng điện thoại:
            <input type="number" min="1" max="10" step="1" value="1" id="number1ex7"/>
        </label>
        <p id="hiddenText7"></p>
        <button onclick="example7()">Kiểm tra</button>
    </div>

<script src="../jsFile/Examples.js"></script>
</body>
</html>
